<!DOCTYPE html>
<html lang="en">

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<meta charset="utf-8">

<title>Scoreboard 2</title>


<style>

body{
margin:0;
background:transparent;
font-family:Arial,sans-serif;
overflow:hidden;
}


.wrapper{

position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);

width:92%;
max-width:1100px;

height:72px;

display:flex;

border-radius:12px;
overflow:hidden;

}


.team{

flex:1;

display:flex;
align-items:center;
justify-content:center;

gap:10px;

font-size:22px;
font-weight:bold;

color:white;

}


.logo{

width:42px;
height:42px;
object-fit:contain;

}


.home{

background:#002b7f;

}


.away{

background:#6a1032;

}



.center{

width:240px;

background:#050505;

color:white;

display:flex;

flex-direction:column;

align-items:center;
justify-content:center;

}



.score{

font-size:32px;
font-weight:bold;

}



.timer{

font-size:17px;

}



.periodBox{

width:65px;

background:#050505;

color:white;

display:flex;

align-items:center;
justify-content:center;

font-size:22px;
font-weight:bold;

}





#tryBanner{


position:fixed;

top:20px;

left:50%;
transform:translateX(-50%);


width:92%;
max-width:1100px;

height:72px;


display:flex;

align-items:center;
justify-content:center;


font-size:48px;

font-weight:900;

color:white;


border-radius:12px;


z-index:20;


opacity:0;


pointer-events:none;


}



#tryBanner.active{


animation:sweep 3s forwards;


}



@keyframes sweep{


0%{
opacity:0;
}


15%{
opacity:1;
}


80%{
opacity:1;
}


100%{
opacity:0;
}


}



</style>


</head>



<body>



<div id="tryBanner">
TRY
</div>



<div class="wrapper">



<div class="team home" id="homeBox">


<img class="logo" id="homeLogo" src="nsw.png">


<span id="homeName">
NSW
</span>


</div>





<div class="center">


<div class="score">

<span id="homeScore">
0
</span>

-

<span id="awayScore">
0
</span>


</div>


<div class="timer" id="timer">
15:00
</div>


</div>






<div class="team away" id="awayBox">


<span id="awayName">
QLD
</span>


<img class="logo" id="awayLogo" src="qld.png">


</div>





<div class="periodBox" id="period">

H1

</div>



</div>





<script type="module">



import {initializeApp}

from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";



import {

getDatabase,
ref,
onValue

}

from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";





const firebaseConfig={


apiKey:"AIzaSyBEYrxxYkYkEzuHlHoc433EfI7mq8gvn60",

authDomain:"scoreboard2-5560e.firebaseapp.com",

databaseURL:
"https://scoreboard2-5560e-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"scoreboard2-5560e",

storageBucket:"scoreboard2-5560e.firebasestorage.app",

messagingSenderId:"577309983779",

appId:"1:577309983779:web:da1ade347e76f5174a5d96"

};




const app=initializeApp(firebaseConfig);


const db=getDatabase(app);



const board=ref(db,"scoreboard");



let lastTry=0;





function format(seconds){


seconds=Math.max(0,seconds);


let m=Math.floor(seconds/60);

let s=seconds%60;


return (

String(m).padStart(2,"0")
+
":"
+
String(s).padStart(2,"0")

);


}






onValue(board,(snap)=>{


let d=snap.val();



if(!d)return;




let home=d.home;

let away=d.away;



document.getElementById("homeScore").innerHTML=
home.score;



document.getElementById("awayScore").innerHTML=
away.score;



document.getElementById("homeName").innerHTML=
home.name;



document.getElementById("awayName").innerHTML=
away.name;




document.getElementById("homeBox").style.background=
home.color;



document.getElementById("awayBox").style.background=
away.color;





document.getElementById("homeLogo").src=
home.logo;



document.getElementById("awayLogo").src=
away.logo;





document.getElementById("period").innerHTML=
d.period;



if(d.clock.running && d.clock.startTime){


let elapsed =
Math.floor(
(Date.now()-d.clock.startTime)/1000
);


document.getElementById("timer").innerHTML =
format(
d.clock.duration-elapsed
);



}else{


document.getElementById("timer").innerHTML =
format(d.clock.duration);


}






if(

d.tryEventId &&
d.tryEventId!==lastTry

){


lastTry=d.tryEventId;


let banner=
document.getElementById("tryBanner");



banner.style.background=
home.score>away.score
?
home.color
:
away.color;



banner.classList.remove("active");


void banner.offsetWidth;


banner.classList.add("active");


}





});





setInterval(()=>{


let event =
new Event("firebaseRefresh");


window.dispatchEvent(event);


},500);



</script>




</body>
</html>
