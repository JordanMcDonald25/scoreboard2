<!DOCTYPE html>
<html lang="en">

<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta charset="utf-8">

<title>Scoreboard Control 2</title>

<style>

body{
margin:0;
background:#050505;
color:white;
font-family:Arial,sans-serif;
padding:10px;
}

.card{
background:#161616;
border-radius:18px;
padding:12px;
margin-bottom:12px;
}

h2{
margin:5px 0 10px;
}

button{
width:48%;
height:50px;
margin:4px 0;
border:0;
border-radius:12px;
background:#262626;
color:white;
font-size:16px;
font-weight:bold;
}

.full{
width:100%;
}

.homeBtn{
background:#002b7f;
}

.awayBtn{
background:#6a1032;
}

input{
width:100%;
padding:12px;
font-size:18px;
border-radius:10px;
background:#222;
color:white;
border:0;
box-sizing:border-box;
}

.status{
margin-top:10px;
color:#aaa;
}

</style>

</head>


<body>


<div class="card">

<h2>NSW</h2>

<button class="homeBtn" onclick="score('home',1)">+1</button>
<button onclick="score('home',-1)">-1</button>

</div>


<div class="card">

<h2>QLD</h2>

<button class="awayBtn" onclick="score('away',1)">+1</button>
<button onclick="score('away',-1)">-1</button>

</div>


<div class="card">

<h2>Clock</h2>

<input id="minutes" type="number" value="15">


<button class="full" onclick="setTime()">SET TIME</button>

<button class="full" onclick="startClock()">START</button>

<button class="full" onclick="pauseClock()">PAUSE</button>

<button class="full" onclick="resetClock()">RESET</button>


</div>


<div class="card">

<button class="full" onclick="setHalf('H1')">
HALF 1
</button>

<button class="full" onclick="setHalf('H2')">
HALF 2
</button>

</div>


<div class="status" id="status">
Connecting...
</div>



<script type="module">


import {initializeApp}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";


import {

getDatabase,
ref,
get,
update,
onValue

}

from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";



const firebaseConfig={


apiKey:"AIzaSyBEYrxxYkYkEzuHlHoc433EfI7mq8gvn60",

authDomain:"scoreboard2-5560e.firebaseapp.com",

databaseURL:
"https://scoreboard2-5560e-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"scoreboard2-5560e",

storageBucket:"scoreboard2-5560e.firebasestorage.app",

messagingSenderId:"577309983779",

appId:"1:577309983779:web:da1ade347e76f5174a5d96"

};



const app=initializeApp(firebaseConfig);

const db=getDatabase(app);


const board=ref(db,"scoreboard");



async function read(){

let snap=await get(board);

return snap.val();

}



async function patch(data){

await update(board,data);

}





window.score=async(team,value)=>{


let d=await read();


let current=d[team].score || 0;


let change=Math.max(0,current+value);


let updateData={};


updateData[team+"/score"]=change;



if(value>0){

updateData["tryEventId"]=Date.now();

}



await patch(updateData);



};






window.setTime=async()=>{


let mins=parseInt(
document.getElementById("minutes").value
);


await patch({

"clock/duration":mins*60,

"clock/running":false,

"clock/startTime":null

});


};







window.startClock=async()=>{


let d=await read();


await patch({

"clock/running":true,

"clock/startTime":Date.now()

});


};







window.pauseClock=async()=>{


let d=await read();


let elapsed =
Math.floor((Date.now()-d.clock.startTime)/1000);



await patch({

"clock/duration":
Math.max(0,d.clock.duration-elapsed),

"clock/running":false,

"clock/startTime":null

});


};







window.resetClock=async()=>{


let mins=parseInt(
document.getElementById("minutes").value
);


await patch({

"clock/duration":mins*60,

"clock/running":false,

"clock/startTime":null,

"tryEventId":0

});


};







window.setHalf=async(h)=>{


await patch({

period:h

});


};







onValue(board,(snap)=>{


let d=snap.val();


if(d){

document.getElementById("status").innerHTML=
"Connected | "+
d.period+
" | "+
d.home.score+
" - "+
d.away.score;

}


});



</script>


</body>
</html>
