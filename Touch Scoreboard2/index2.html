<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Scoreboard 2</title>


<style>


body{

margin:0;
background:transparent;
font-family:Arial;
overflow:hidden;

}


.wrapper{

position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
width:92%;
max-width:1100px;
height:75px;
display:flex;
border-radius:12px;
overflow:hidden;

}


.team{

flex:1;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
font-size:22px;
color:white;
font-weight:bold;

}


.home{

background:#002b7f;

}


.away{

background:#6a1032;

}



.logo{

width:45px;
height:45px;
object-fit:contain;

}



.center{

width:240px;
background:#050505;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

}



.score{

font-size:32px;
font-weight:bold;

}



#try{

position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
height:75px;
width:92%;
max-width:1100px;
display:none;
align-items:center;
justify-content:center;
font-size:48px;
font-weight:bold;
color:white;
border-radius:12px;

}



.active{

display:flex!important;

}


</style>

</head>


<body>



<div id="try">
TRY
</div>



<div class="wrapper">



<div class="team home" id="homeBox">

<img id="homeLogo" class="logo">

<span id="homeName"></span>

</div>



<div class="center">


<div class="score">

<span id="homeScore">0</span>
-
<span id="awayScore">0</span>

</div>


<div id="clock">

15:00

</div>


</div>



<div class="team away" id="awayBox">


<span id="awayName"></span>


<img id="awayLogo" class="logo">


</div>


<div id="period">

H1

</div>


</div>





<script type="module">


import {
initializeApp
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";


import {
getDatabase,
ref,
onValue
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";




const firebaseConfig={

apiKey:"AIzaSyBEYrxxYkYkEzuHlHoc433EfI7mq8gvn60",

databaseURL:"https://scoreboard2-5560e-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"scoreboard2-5560e"

};


const app=initializeApp(firebaseConfig);

const db=getDatabase(app);



let lastTry=0;



function format(sec){

let m=Math.floor(sec/60);

let s=sec%60;

return (
String(m).padStart(2,"0")
+
":"
+
String(s).padStart(2,"0")
);

}




onValue(
ref(db,"scoreboard"),
snap=>{


let d=snap.val();


if(!d)return;



homeName.textContent=d.home.name;

awayName.textContent=d.away.name;


homeScore.textContent=d.home.score;

awayScore.textContent=d.away.score;



homeLogo.src=d.home.logo;

awayLogo.src=d.away.logo;



homeBox.style.background=d.home.color;

awayBox.style.background=d.away.color;



period.textContent=d.period;



let time=d.clock.duration;



if(
d.clock.running &&
d.clock.startTime
){

time -=
Math.floor(
(Date.now()-d.clock.startTime)/1000
);

}



clock.textContent=
format(Math.max(0,time));





if(
d.tryEventId &&
d.tryEventId!==lastTry
){

lastTry=d.tryEventId;


let t=document.getElementById("try");


t.style.background =
d.home.score>d.away.score
?
d.home.color
:
d.away.color;



t.classList.add("active");


setTimeout(()=>{

t.classList.remove("active");

},3000);


}




});


</script>


</body>
</html>
